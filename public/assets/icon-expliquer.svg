<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" fill="none">
  <!-- Halo -->
  <circle cx="40" cy="40" r="36" fill="rgba(66,199,255,0.08)" stroke="rgba(66,199,255,0.18)" stroke-width="1"/>
  <!-- Tableau -->
  <rect x="18" y="20" width="36" height="24" rx="2" stroke="#42c7ff" stroke-width="2" fill="rgba(66,199,255,0.07)"/>
  <!-- Lignes sur le tableau -->
  <line x1="24" y1="28" x2="38" y2="28" stroke="#42c7ff" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="24" y1="33" x2="44" y2="33" stroke="#42c7ff" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="24" y1="38" x2="36" y2="38" stroke="#42c7ff" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Pied du tableau -->
  <line x1="36" y1="44" x2="36" y2="50" stroke="#42c7ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="50" x2="43" y2="50" stroke="#42c7ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Professeur (personnage simple) -->
  <circle cx="57" cy="28" r="4" stroke="#42c7ff" stroke-width="2" fill="rgba(66,199,255,0.1)"/>
  <path d="M53 44 C53 36 61 36 61 44" stroke="#42c7ff" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Bras pointant -->
  <line x1="53" y1="39" x2="48" y2="36" stroke="#42c7ff" stroke-width="1.8" stroke-linecap="round"/>
</svg>
